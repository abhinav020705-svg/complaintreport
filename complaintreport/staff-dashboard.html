<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initTheme(); checkStaffAccess(); loadStaffDashboard()">

<header>
  <nav>
    <h2>Complaint Reporting - Staff Portal</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><span id="staffNameDisplay" style="color: white; font-weight: bold;"></span></li>
      <li><button class="toggleBtn" onclick="toggleTheme()"> Theme</button></li>
      <li><button class="btn secondary" style="padding: 8px 12px;" onclick="staffLogout()">Logout</button></li>
    </ul>
  </nav>
</header>

<div class="container">
  <div class="hero">
    <h1>Your Assigned Complaints</h1>
    <p>Manage and update the status of your assigned tasks.</p>
  </div>

  <div class="card">
    <h2>Filters</h2>
    <div class="grid2">
      <input id="staffSearchText" type="text" placeholder="Search (ID/Name/Location)" onkeyup="loadStaffDashboard()">

      <select id="staffFilterStatus" onchange="loadStaffDashboard()">
        <option value="ALL">All Status</option>
        <option value="pending">Pending</option>
        <option value="progress">In Progress</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>

    <br>

    <select id="staffFilterCategory" onchange="loadStaffDashboard()">
      <option value="ALL">All Categories</option>
      <option>Road Damage</option>
      <option>Water Issue</option>
      <option>Garbage</option>
      <option>Streetlight</option>
      <option>Drainage</option>
      <option>Others</option>
    </select>
  </div>

  <div class="card table-wrap">
    <h2>My Assigned Complaints</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ID</th>
          <th>Category</th>
          <th>Location</th>
          <th>Complaint</th>
          <th>Status</th>
          <th>Submitted</th>
          <th>Update Status</th>
          <th>Note</th>
        </tr>
      </thead>

      <tbody id="staffComplaintBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Summary</h2>
    <div class="grid2">
      <div>
        <p><b>Pending:</b> <span id="countPending" style="color: #ed6c02; font-size: 18px; font-weight: bold;">0</span></p>
      </div>
      <div>
        <p><b>In Progress:</b> <span id="countProgress" style="color: #1565c0; font-size: 18px; font-weight: bold;">0</span></p>
      </div>
      <div>
        <p><b>Resolved:</b> <span id="countResolved" style="color: #2e7d32; font-size: 18px; font-weight: bold;">0</span></p>
      </div>
      <div>
        <p><b>Total:</b> <span id="countTotal" style="color: #555; font-size: 18px; font-weight: bold;">0</span></p>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
