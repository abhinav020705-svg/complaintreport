<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initTheme(); checkAdminAccess(); loadAdmin()">

<header>
  <nav>
    <h2>Complaint Reporting</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="report.html">Report</a></li>
      <li><a href="track.html">Track</a></li>
      <li><a href="login.html">Admin</a></li>
      <li><a href="staff-login.html">Staff</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button class="toggleBtn" onclick="toggleTheme()"> Theme</button></li>
    </ul>
  </nav>
</header>

<div class="container">
  <div class="hero">
    <h1>Admin Dashboard</h1>
    <p>Search, filter, update status, and manage complaints.</p>
    <br>
    <div class="btns">
      <a href="staff-management.html" class="btn">👥 Manage Staff</a>
      <button class="btn" onclick="clearAll()">Clear All Complaints</button>
      <button class="btn secondary" onclick="adminLogout()">Logout</button>
    </div>

  </div>

  <div class="card">
    <h2>Filters</h2>
    <div class="grid2">
      <input id="searchText" type="text" placeholder="Search (ID/Name/Phone/Location)" onkeyup="renderComplaints()">

      <select id="filterCategory" onchange="renderComplaints()">
        <option value="ALL">All Categories</option>
        <option>Road Damage</option>
        <option>Water Issue</option>
        <option>Garbage</option>
        <option>Streetlight</option>
        <option>Drainage</option>
        <option>Others</option>
      </select>
    </div>

    <br>

    <div class="grid2">
      <select id="filterStatus" onchange="renderComplaints()">
        <option value="ALL">All Status</option>
        <option value="pending">Pending</option>
        <option value="progress">In Progress</option>
        <option value="resolved">Resolved</option>
      </select>

      <select id="filterDepartment" onchange="renderComplaints()">
        <option value="ALL">All Departments</option>
        <option>Roads & Infrastructure</option>
        <option>Water & Sanitation</option>
        <option>Waste Management</option>
        <option>Public Lighting</option>
        <option>Drainage & Sewerage</option>
        <option>Other Services</option>
      </select>
    </div>
  </div>

  <div class="card table-wrap">
    <h2>All Complaints</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ID</th>
          <th>Category</th>
          <th>Department</th>
          <th>Location</th>
          <th>Status</th>
          <th>Created</th>
          <th>Update Status</th>
          <th>Assigned To</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="complaintBody"></tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
